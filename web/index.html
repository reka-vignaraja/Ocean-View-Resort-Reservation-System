<!DOCTYPE html>
<html>
<head>
    <title>Ocean View Resort</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('images/beach.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        /* ===== Fixed Navbar ===== */

.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);   
    display: flex;
    align-items: center;      /* Vertical center */
    justify-content: space-between; /* Space between logo & links */
    padding: 0 50px;
    box-sizing: border-box;
    z-index: 1000;
}

/* Navbar Title */
.navbar h2 {
    color: white;
    margin: 0;
    font-size: 22px;
}

/* Nav Links Container */
.nav-links {
    display: flex;
    align-items: center;
    gap: 30px;   /* Space between links */
}

/* Individual Links */
.nav-links a {
    text-decoration: none;
    color: white;
    font-size: 16px;
    font-weight: 500;
    transition: 0.3s;
}

/* Hover Effect */
.nav-links a:hover {
    color: #ffd700;
}
        /* Dropdown */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            cursor: pointer;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            min-width: 180px;
            border-radius: 10px;
            overflow: hidden;
            z-index: 1000;
        }

        .dropdown-content a {
            display: block;
            padding: 12px 15px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .dropdown-content a:hover {
            background: rgba(0, 198, 255, 0.5);
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* Center Content */
        .home-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .home-container h1 {
            font-size: 48px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .home-container p {
            font-size: 20px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .tagline {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 40px;
            color: #00c6ff;
        }

        /* Glass Cards */
        .card-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 260px;
            color: white;
            cursor: pointer;
            transition: 0.4s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(0, 198, 255, 0.3);
        }

        .card h3 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Stylish Button */
        .login-btn {
            margin-top: 40px;
            padding: 14px 40px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.4s;
        }

        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* Responsive */
        @media(max-width: 768px){
            .home-container h1 {
                font-size: 32px;
            }

            .card-container {
                flex-direction: column;
                align-items: center;
            }
        }

    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>🌊 Ocean View Resort</h2>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.jsp">About</a>
            <a href="availableRooms.jsp">Rooms</a>
            <a href="contact.jsp">Contact Us</a>

            
        </div>
    </div>

    <!-- Home Content -->
    <div class="home-container">
        <h1>Welcome to Ocean View Resort</h1>
        <p>Smart Room Reservation Management System</p>
        <div class="tagline">Your Stay, Your Way.</div>

        <div class="card-container">
            <div class="card" onclick="location.href='customerLogin.jsp'">
                <h3>Book Now</h3>
                <p>Reserve your perfect room today</p>
            </div>

            <div class="card" onclick="location.href='help.jsp'">
                <h3>Help & Support</h3>
                <p>System usage guidelines</p>
            </div>
            <div class="card" onclick="location.href='Gallery.jsp'">
                <h3>Our Gallery</h3>
                <p>Every Picture Has a Tale</p>
            </div>
        </div>

        <a href="features.jsp" class="login-btn">Read More</a>
    </div>

</body>
</html>
